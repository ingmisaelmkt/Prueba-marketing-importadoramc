<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Web - UX Iconix PCP</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #071824;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .banner-container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            text-align: center;
        }
        .banner-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #15ace8;
        }
        .controls {
            margin-top: 20px;
        }
        .btn-download {
            background-color: #15ace8;
            color: #fff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s;
        }
        .btn-download:hover {
            background-color: #108abf;
        }
        .btn-back {
            color: #7a9bb0;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }
        .btn-back:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="banner-container">
        <img src="Banner_UX_Iconix.png" alt="Banner Oficial UX Iconix PCP" class="banner-image">
        
        <div class="controls">
            <a href="index.html" class="btn-back">← VOLVER AL MENÚ</a>
            <a href="Banner_UX_Iconix.png" download class="btn-download">⬇ Descargar Banner (PNG)</a>
        </div>
    </div>
</body>
</html>
